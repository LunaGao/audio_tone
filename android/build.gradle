group = "com.maomishen.audio_tone"
version = "1.0-SNAPSHOT"

def loadProperties = { File propertiesFile ->
    def properties = new Properties()
    if (propertiesFile.exists()) {
        propertiesFile.withInputStream { properties.load(it) }
    }
    properties
}

def resolveStandaloneFlutterSdkDir = {
    def localProperties = loadProperties(file("local.properties"))
    def candidatePaths = [
        localProperties.getProperty("flutter.sdk"),
        findProperty("flutter.sdk"),
        findProperty("flutter-root"),
        System.getenv("FLUTTER_ROOT"),
        System.getenv("FLUTTER_HOME"),
        new File(projectDir.parentFile, ".fvm/flutter_sdk").absolutePath,
    ]

    candidatePaths
        .findAll { it != null && !it.toString().trim().isEmpty() }
        .collect { file(it.toString()) }
        .find { it.exists() }
}

def resolveStandaloneFlutterJar = {
    def flutterSdkDir = resolveStandaloneFlutterSdkDir()
    if (flutterSdkDir == null) {
        return null
    }

    def engineDir = new File(flutterSdkDir, "bin/cache/artifacts/engine")
    def flutterJarCandidates = [
        "android-arm64/flutter.jar",
        "android-arm/flutter.jar",
        "android-x64/flutter.jar",
        "android-x86/flutter.jar",
        "android-arm64-release/flutter.jar",
        "android-arm-release/flutter.jar",
        "android-x64-release/flutter.jar",
        "android-arm64-profile/flutter.jar",
        "android-arm-profile/flutter.jar",
        "android-x64-profile/flutter.jar",
    ].collect { new File(engineDir, it) }

    flutterJarCandidates.find { it.exists() }
}

def standaloneFlutterJar = null
if (project == rootProject) {
    standaloneFlutterJar = resolveStandaloneFlutterJar()
    if (standaloneFlutterJar == null) {
        throw new GradleException(
            "Standalone Android Gradle builds require Flutter Android artifacts. " +
            "Set `flutter.sdk` in ${file('local.properties')} or export FLUTTER_ROOT, " +
            "then run `flutter precache --android`."
        )
    }
}

buildscript {
    ext.kotlin_version = "2.1.0"
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.9.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"

android {
    namespace = "com.maomishen.audio_tone"

    compileSdk = 36

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 24
    }

    dependencies {
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("org.mockito:mockito-core:5.0.0")
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    if (standaloneFlutterJar != null) {
        compileOnly files(standaloneFlutterJar)
        testImplementation files(standaloneFlutterJar)
    }
}